alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
domains:
- domain: robot2048.com
  type: PRIMARY
  zone: robot2048.com
envs:
- key: AT_HOME
  scope: RUN_AND_BUILD_TIME
  value: DO
- key: S3_REGION
  scope: RUN_AND_BUILD_TIME
  value: fra1
- key: S3_ACCESS_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: S3_SECRET_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
ingress:
  rules:
  - component:
      name: ts-vite-ui
    match:
      path:
        prefix: /
  - component:
      name: api
    match:
      path:
        prefix: /service
name: robot-2048
region: fra
services:
- dockerfile_path: api/Dockerfile
  github:
    branch: master
    deploy_on_push: true
    repo: abachurin/robot-2048
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xxs
  name: api
  source_dir: /api
workers:
- dockerfile_path: julia-worker/Dockerfile
  github:
    branch: master
    deploy_on_push: true
    repo: abachurin/robot-2048
  instance_count: 1
  instance_size_slug: professional-m
  name: julia-worker
  source_dir: /julia-worker
static_sites:
- build_command: npm run build
  environment_slug: node-js
  github:
    branch: master
    deploy_on_push: true
    repo: abachurin/robot-2048
  name: ts-vite-ui
  source_dir: /ts-vite-ui
