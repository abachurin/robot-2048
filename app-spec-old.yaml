alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
domains:
- domain: robot2048.com
  type: PRIMARY
  zone: robot2048.com
envs:
- key: AT_HOME
  scope: RUN_AND_BUILD_TIME
  value: DO
- key: S3_REGION
  scope: RUN_AND_BUILD_TIME
  value: fra1
- key: S3_ACCESS_KEY
  scope: RUN_AND_BUILD_TIME
  value: <look up in DO Spaces settings>
- key: S3_SECRET_KEY
  scope: RUN_AND_BUILD_TIME
  value: <look up in DO Spaces settings>
ingress:
  rules:
  - component:
      name: ts-vite-ui
    match:
      path:
        prefix: /
  - component:
      name: api
    match:
      path:
        prefix: /service
name: robot-2048
region: lon
services:
- dockerfile_path: Dockerfile
  github:
    branch: master
    deploy_on_push: true
    repo: abachurin/api-2048
  http_port: 5000
  instance_count: 0
  instance_size_slug: basic-xxs
  name: api
  source_dir: /
static_sites:
- build_command: npm run build
  environment_slug: node-js
  github:
    branch: master
    deploy_on_push: true
    repo: abachurin/ts-vite-ui
  name: ts-vite-ui
  source_dir: /
workers:
- dockerfile_path: Dockerfile
  github:
    branch: master
    deploy_on_push: true
    repo: abachurin/worker-2048
  instance_count: 0
  instance_size_slug: basic-m
  name: service
  source_dir: /
